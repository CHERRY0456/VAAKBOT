<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VaakBot — Voice Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --bg: #0a0c10; --surface: #111318; --border: #1e2230; --accent: #ff5f2e; --accent2: #ffb347; --text: #e8eaf0; --muted: #5a5f72; --green: #2aff8f; --red: #ff3b5c; --yellow: #ffe066; --radius: 12px; --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 720px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-mark { width: 40px; height: 40px; background: var(--accent); border-radius: 8px; display: grid; place-items: center; font-size: 20px; font-weight: 800; color: #fff; flex-shrink: 0; }
  header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
  header span { color: var(--accent); }
  .badge { margin-left: auto; font-family: var(--mono); font-size: 11px; background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; color: var(--muted); }
  .pipeline { display: flex; align-items: center; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 20px; overflow-x: auto; gap: 4px; }
  .pipe-step { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; transition: color .3s; }
  .pipe-step.active { color: var(--green); }
  .pipe-step.active .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .pipe-step .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: all .3s; }
  .pipe-arrow { color: var(--border); font-size: 13px; padding: 0 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; }
  .viz-wrap { position: relative; height: 80px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
  #waveCanvas { width: 100%; height: 100%; display: block; }
  .viz-label { position: absolute; top: 6px; left: 10px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .controls { display: flex; gap: 12px; margin-bottom: 20px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; letter-spacing: .3px; }
  .btn-record { background: var(--accent); color: #fff; }
  .btn-record:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-record:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
  .btn-record.recording { background: var(--red); animation: pulse-btn 1.2s ease-in-out infinite; }
  @keyframes pulse-btn { 0%,100% { box-shadow: 0 0 0 0 rgba(255,59,92,.5); } 50% { box-shadow: 0 0 0 10px rgba(255,59,92,0); } }
  .btn-stop { background: var(--border); color: var(--text); flex: 0 0 auto; padding: 14px 20px; }
  .btn-stop:hover:not(:disabled) { background: #2a2d3a; }
  .btn-stop:disabled { opacity: .4; cursor: not-allowed; }
  .silence-bar-wrap { margin-bottom: 16px; display: none; }
  .silence-bar-wrap.visible { display: block; }
  .silence-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  #silenceTimer { color: var(--accent2); }
  .silence-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .silence-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--green), var(--accent2), var(--red)); border-radius: 2px; transition: width .1s linear; }
  .vad-row { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 12px; margin-bottom: 16px; color: var(--muted); }
  .vad-pill { padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: var(--border); color: var(--muted); transition: all .2s; }
  .vad-pill.speech { background: rgba(42,255,143,.15); color: var(--green); }
  .vad-pill.silence { background: var(--border); color: var(--muted); }
  #energyVal { color: var(--text); }
  .status-row { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; color: var(--muted); min-height: 20px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: all .3s; }
  .status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.warn { background: var(--yellow); }
  .status-dot.err { background: var(--red); }
  .status-dot.spin { background: var(--accent); animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .response-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; display: none; }
  .response-card.visible { display: block; }
  .resp-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .resp-text { font-size: 1.15rem; font-weight: 700; color: var(--text); line-height: 1.5; margin-bottom: 14px; }
  .confidence-row { display: flex; align-items: center; gap: 10px; }
  .conf-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .conf-fill { height: 100%; width: 0%; border-radius: 3px; transition: width .6s ease; }
  .conf-fill.high { background: var(--green); }
  .conf-fill.medium { background: var(--yellow); }
  .conf-fill.low { background: var(--red); }
  .conf-verdict { font-family: var(--mono); font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 700; white-space: nowrap; }
  .conf-verdict.accept { background: rgba(42,255,143,.12); color: var(--green); }
  .conf-verdict.confirm { background: rgba(255,224,102,.12); color: var(--yellow); }
  .conf-verdict.reject { background: rgba(255,59,92,.12); color: var(--red); }
  .metrics { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; }
  .metrics-title { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .metric-item { text-align: center; }
  .metric-val { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--accent2); }
  .metric-key { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .log-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; max-height: 160px; overflow-y: auto; font-family: var(--mono); font-size: 11px; line-height: 1.6; color: var(--muted); }
  .log-wrap::-webkit-scrollbar { width: 4px; }
  .log-wrap::-webkit-scrollbar-thumb { background: var(--border); }
  .log-entry { display: flex; gap: 8px; }
  .log-ts { color: var(--muted); flex-shrink: 0; }
  .log-msg { color: var(--text); }
  .log-entry.ok .log-msg { color: var(--green); }
  .log-entry.warn .log-msg { color: var(--yellow); }
  .log-entry.err .log-msg { color: var(--red); }
  .notice { background: rgba(255,95,46,.07); border: 1px solid rgba(255,95,46,.25); border-radius: 8px; padding: 12px 16px; font-family: var(--mono); font-size: 11px; color: var(--accent2); line-height: 1.7; margin-bottom: 16px; }
  .notice strong { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-mark">व</div>
    <h1>Vaak<span>Bot</span></h1>
    <div class="badge">POC</div>
  </header>

  <div class="pipeline">
    <div class="pipe-step" id="ps-mic"><div class="dot"></div>MIC</div><div class="pipe-arrow">→</div>
    <div class="pipe-step" id="ps-frame"><div class="dot"></div>FRAME</div><div class="pipe-arrow">→</div>
    <div class="pipe-step" id="ps-rnn"><div class="dot"></div>RNNOISE + VAD</div><div class="pipe-arrow">→</div>
    <div class="pipe-step" id="ps-buf"><div class="dot"></div>BUFFER</div><div class="pipe-arrow">→</div>
    <div class="pipe-step" id="ps-send"><div class="dot"></div>SEND</div><div class="pipe-arrow">→</div>
    <div class="pipe-step" id="ps-resp"><div class="dot"></div>RESPONSE</div>
  </div>

  <div class="card">
    <div class="viz-wrap">
      <canvas id="waveCanvas"></canvas>
      <div class="viz-label">WAVEFORM · 48kHz</div>
    </div>

    <div class="vad-row">
      <span>AI VAD:</span>
      <div class="vad-pill silence" id="vadPill">SILENCE</div>
      <span>Prob:</span>
      <span id="energyVal">—</span>
      <span style="margin-left:auto;font-size:11px;" id="frameCount">Frames: 0</span>
    </div>

    <div class="silence-bar-wrap" id="silenceBarWrap">
      <div class="silence-label">
        <span>Silence auto-stop</span>
        <span id="silenceTimer">2.0s</span>
      </div>
      <div class="silence-track">
        <div class="silence-fill" id="silenceFill"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-record" id="btnRecord" onclick="startRecording()">🎙 Start Recording</button>
      <button class="btn btn-stop" id="btnStop" disabled onclick="stopRecording()">■ Stop</button>
    </div>

    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Idle — click Start to begin</span>
    </div>
  </div>

  <div class="response-card" id="responseCard">
    <div class="resp-label">Transcript Response</div>
    <div class="resp-text" id="respText">—</div>
    <div class="confidence-row">
      <div class="conf-bar-wrap"><div class="conf-fill" id="confFill"></div></div>
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);min-width:40px" id="confPct">—</span>
      <div class="conf-verdict" id="confVerdict"></div>
    </div>
  </div>

  <div class="metrics">
    <div class="metrics-title">⚡ Latency Metrics</div>
    <div class="metrics-grid">
      <div class="metric-item"><div class="metric-val" id="mVad">—</div><div class="metric-key">Frames Total</div></div>
      <div class="metric-item"><div class="metric-val" id="mRnn">—</div><div class="metric-key">RNNoise Avg</div></div>
      <div class="metric-item"><div class="metric-val" id="mTotal">—</div><div class="metric-key">Total Suppression</div></div>
    </div>
  </div>
  <div class="log-wrap" id="logWrap"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────
// FIX: RNNoise strictly requires 48kHz sample rate to match its 480-sample frame constraint.
const SAMPLE_RATE       = 48000;
const FRAME_MS          = 10;           
const FRAME_SIZE        = 480; // 10ms at 48kHz (Strict requirement for WASM shape)
const SILENCE_FRAMES_MAX= 200; // 2.0s of silence (200 frames * 10ms)
const VAD_THRESHOLD     = 0.7; 
const BACKEND_URL       = "http://localhost:8000/process";

// ─── STATE ────────────────────────────────────────────────────
let audioCtx        = null;
let mediaStream     = null;
let processorNode   = null;
let isRecording     = false;

// Ring Buffer logic
let rawBuffer       = new Float32Array(16384);
let rawBufferCount  = 0;
let speechBuffer    = [];      

// Tracking
let hasSpoken       = false;
let silenceFrames   = 0;
let frameCounter    = 0;
let rnnTimeSum      = 0;
let consecutiveSpeechFrames = 0;

// RNNoise WASM
let rnnoiseModule   = null;
let rnnoiseState    = null;
let rnnoiseProcess  = null;
let rnnoiseReady    = false;
let rnnoiseInputPtr = null;
let rnnoiseOutputPtr= null;

// ─── UI HELPERS ───────────────────────────────────────────────
function log(msg, level = '') {
  const wrap = document.getElementById('logWrap');
  const ts = new Date().toISOString().substr(11, 8);
  const el = document.createElement('div');
  el.className = `log-entry ${level}`;
  el.innerHTML = `<span class="log-ts">${ts}</span><span class="log-msg">${msg}</span>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function setPipelineStage(stages) {
  ['ps-mic','ps-frame','ps-rnn','ps-buf','ps-send','ps-resp'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  stages.forEach(s => document.getElementById(s)?.classList.add('active'));
}

function setStatus(msg, type = '') {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusDot').className = 'status-dot ' + type;
}

// ─── WASM LOADER ──────────────────────────────────────────────
async function loadRNNoise() {
  log('Loading RNNoise WASM (via CDN)...');
  try {
    const mod = await import('https://unpkg.com/@jitsi/rnnoise-wasm@0.2.1/dist/rnnoise-sync.js');
    const factory = mod.default || mod.createRNNoiseModule || mod;
    
    rnnoiseModule = await factory();
    rnnoiseProcess = rnnoiseModule._rnnoise_process_frame;
    const create = rnnoiseModule._rnnoise_create;
    
    // Allocate exactly enough memory for 480 32-bit floats
    rnnoiseInputPtr  = rnnoiseModule._malloc(FRAME_SIZE * 4);
    rnnoiseOutputPtr = rnnoiseModule._malloc(FRAME_SIZE * 4);
    rnnoiseState = create();
    rnnoiseReady = true;
    
    log('RNNoise WASM ready ✓', 'ok');
    setStatus('Ready — click Start', 'ok');
  } catch (e) {
    log(`RNNoise load failed: ${e.message}`, 'warn');
  }
}

// ─── PROCESS 10ms FRAME ───────────────────────────────────────
function processFrame(frame32) {
  if (!rnnoiseReady) return { cleaned: frame32, vadProb: 1.0 };

  const t0 = performance.now();
  
  // Safely copy data into the exact bounds of the WASM heap
  const heapF32In = new Float32Array(rnnoiseModule.HEAPF32.buffer, rnnoiseInputPtr, FRAME_SIZE);
  for (let i = 0; i < FRAME_SIZE; i++) heapF32In[i] = frame32[i] * 32768.0;

  const vadProb = rnnoiseProcess(rnnoiseState, rnnoiseOutputPtr, rnnoiseInputPtr);

  const heapF32Out = new Float32Array(rnnoiseModule.HEAPF32.buffer, rnnoiseOutputPtr, FRAME_SIZE);
  const cleaned = new Float32Array(FRAME_SIZE);
  for (let i = 0; i < FRAME_SIZE; i++) cleaned[i] = heapF32Out[i] / 32768.0;

  rnnTimeSum += (performance.now() - t0);
  return { cleaned, vadProb };
}

// ─── AUDIO INGESTION (RING BUFFER) ────────────────────────────
function handleAudioData(input) {
  if (!isRecording) return;
  setPipelineStage(['ps-mic', 'ps-frame']);

  if (rawBufferCount + input.length > rawBuffer.length) {
    const newBuf = new Float32Array(rawBuffer.length * 2);
    newBuf.set(rawBuffer);
    rawBuffer = newBuf;
  }
  rawBuffer.set(input, rawBufferCount);
  rawBufferCount += input.length;

  while (rawBufferCount >= FRAME_SIZE) {
    const frame = rawBuffer.slice(0, FRAME_SIZE);
    
    rawBuffer.copyWithin(0, FRAME_SIZE, rawBufferCount);
    rawBufferCount -= FRAME_SIZE;

    setPipelineStage(['ps-mic', 'ps-frame', 'ps-rnn']);
    const { cleaned, vadProb } = processFrame(frame);
    frameCounter++;

    const isSpeech = vadProb > VAD_THRESHOLD;

    if (isSpeech) {
      consecutiveSpeechFrames++;
      // Require 30 consecutive frames (~300ms) to bypass random noise
      if (consecutiveSpeechFrames >= 30) {
          hasSpoken = true;
      }
      silenceFrames = 0;
      speechBuffer.push(cleaned);
      setPipelineStage(['ps-mic', 'ps-frame', 'ps-rnn', 'ps-buf']);
    } else {
      consecutiveSpeechFrames = 0; 
      silenceFrames++;
      if (hasSpoken) speechBuffer.push(cleaned); 
    }

    if (hasSpoken) {
       updateSilenceUI();
       if (silenceFrames >= SILENCE_FRAMES_MAX) {
          log('2.0s silence detected → auto-stop', 'warn');
          stopRecording();
          break; 
       }
    }

    // Throttled UI Updates
    if (frameCounter % 10 === 0) updateVADUI(isSpeech, vadProb);
    if (frameCounter % 5 === 0) drawWave(cleaned, isSpeech);
  }
}

// ─── UI UPDATERS ──────────────────────────────────────────────
function updateVADUI(isSpeech, prob) {
  const pill = document.getElementById('vadPill');
  document.getElementById('energyVal').textContent = prob.toFixed(3);
  document.getElementById('frameCount').textContent = `Frames: ${frameCounter}`;
  
  if (isSpeech) {
    pill.textContent = 'SPEECH';
    pill.className = 'vad-pill speech';
  } else {
    pill.textContent = 'SILENCE';
    pill.className = 'vad-pill silence';
  }

  document.getElementById('mVad').textContent = frameCounter;
  document.getElementById('mRnn').textContent = (rnnTimeSum / frameCounter).toFixed(2) + 'ms';
  document.getElementById('mTotal').textContent = (rnnTimeSum).toFixed(0) + 'ms';
}

function updateSilenceUI() {
  const fill = document.getElementById('silenceFill');
  const timer = document.getElementById('silenceTimer');
  const pct = Math.min(100, (silenceFrames / SILENCE_FRAMES_MAX) * 100);
  fill.style.width = pct + '%';
  const remaining = Math.max(0, ((SILENCE_FRAMES_MAX - silenceFrames) * 10) / 1000);
  timer.textContent = remaining.toFixed(1) + 's';
}

// ─── RECORDING CONTROLS (AUDIOWORKLET) ────────────────────────
async function startRecording() {
  if (isRecording) return;
  setStatus('Requesting mic...', 'spin');

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { 
        channelCount: 1, 
        sampleRate: SAMPLE_RATE, 
        echoCancellation: true, 
        noiseSuppression: true,
        autoGainControl: true
      } 
    });
  } catch (e) {
    return setStatus('Mic denied', 'err');
  }

  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  
  // FIX: Build the AudioWorklet dynamically in memory to avoid the deprecation warning
  const workletCode = `
    class RecorderWorklet extends AudioWorkletProcessor {
      process(inputs, outputs, parameters) {
        const input = inputs[0];
        if (input && input.length > 0 && input[0].length > 0) {
          this.port.postMessage(input[0]);
        }
        return true;
      }
    }
    registerProcessor('recorder-worklet', RecorderWorklet);
  `;
  const blob = new Blob([workletCode], { type: 'application/javascript' });
  const blobUrl = URL.createObjectURL(blob);
  
  await audioCtx.audioWorklet.addModule(blobUrl);
  processorNode = new AudioWorkletNode(audioCtx, 'recorder-worklet');
  
  processorNode.port.onmessage = (event) => {
    handleAudioData(event.data);
  };

  const sourceNode = audioCtx.createMediaStreamSource(mediaStream);
  sourceNode.connect(processorNode);

  speechBuffer = [];
  rawBufferCount = 0;
  frameCounter = silenceFrames = rnnTimeSum = consecutiveSpeechFrames = 0;
  hasSpoken = false;
  isRecording = true;

  document.getElementById('btnRecord').disabled = true;
  document.getElementById('btnRecord').classList.add('recording');
  document.getElementById('btnStop').disabled = false;
  document.getElementById('silenceBarWrap').classList.add('visible');
  document.getElementById('silenceFill').style.width = '0%';
  
  setStatus('Recording — speak in Hindi/Hinglish', 'ok');
}

async function stopRecording() {
  if (!isRecording) return;
  isRecording = false;

  if (processorNode) processorNode.disconnect();
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();

  if (hasSpoken && silenceFrames > 0) {
    speechBuffer = speechBuffer.slice(0, Math.max(0, speechBuffer.length - silenceFrames));
  }

  document.getElementById('btnRecord').disabled = false;
  document.getElementById('btnRecord').classList.remove('recording');
  document.getElementById('btnStop').disabled = true;
  document.getElementById('silenceBarWrap').classList.remove('visible');

  if (speechBuffer.length === 0) {
    setStatus('No speech detected', 'warn');
    setPipelineStage([]);
    return;
  }

  const flat = new Float32Array(speechBuffer.reduce((a, f) => a + f.length, 0));
  let offset = 0;
  for (const f of speechBuffer) { flat.set(f, offset); offset += f.length; }

  await sendToBackend(buildWAV(flat, SAMPLE_RATE));
}

// ─── WAV & NETWORKING ─────────────────────────────────────────
function buildWAV(float32Samples, sampleRate) {
  const int16 = new Int16Array(float32Samples.length);
  for (let i = 0; i < float32Samples.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Samples[i]));
    int16[i] = s < 0 ? s * 32768 : s * 32767;
  }
  const buffer = new ArrayBuffer(44 + int16.byteLength);
  const view = new DataView(buffer);
  const write = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
  write(0, 'RIFF'); view.setUint32(4, 36 + int16.byteLength, true);
  write(8, 'WAVE'); write(12, 'fmt '); view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true); view.setUint16(34, 16, true);
  write(36, 'data'); view.setUint32(40, int16.byteLength, true);
  new Int16Array(buffer, 44).set(int16);
  return new Blob([buffer], { type: 'audio/wav' });
}

async function sendToBackend(wavBlob) {
  setPipelineStage(['ps-send']);
  setStatus('Sending to API...', 'spin');
  const form = new FormData();
  form.append('audio', wavBlob, 'recording.wav');

  try {
    const t0 = performance.now();
    const resp = await fetch(BACKEND_URL, { method: 'POST', body: form });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    showResponse(await resp.json());
    log(`Backend returned in ${(performance.now() - t0).toFixed(0)}ms`, 'ok');
  } catch (e) {
    setStatus('Backend error', 'err');
    setPipelineStage([]);
  }
}

function showResponse(data) {
  setPipelineStage(['ps-resp']);
  document.getElementById('responseCard').classList.add('visible');
  
  document.getElementById('respText').textContent = data.text || '(no text)';
  const conf = Math.max(0, Math.min(1, data.confidence ?? 0));
  
  const fill = document.getElementById('confFill');
  fill.style.width = (conf * 100) + '%';
  fill.className = 'conf-fill ' + (conf > 0.7 ? 'high' : conf >= 0.5 ? 'medium' : 'low');
  document.getElementById('confPct').textContent = (conf * 100).toFixed(0) + '%';
  
  const verdictStr = data.verdict || 'UNKNOWN';
  const v = document.getElementById('confVerdict');
  v.textContent = verdictStr;
  v.className = 'conf-verdict ' + verdictStr.toLowerCase();
  
  setStatus('Complete ✓', 'ok');
}

let waveData = new Float32Array(200);
function drawWave(frame, isSpeech) {
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  for (let i = 0; i < waveData.length - 1; i++) waveData[i] = waveData[i + 1];
  waveData[waveData.length - 1] = Math.sqrt(frame.reduce((a, v) => a + v * v, 0) / frame.length);
  
  ctx.beginPath();
  ctx.strokeStyle = isSpeech ? '#2aff8f' : '#1e2230';
  ctx.lineWidth = 2;
  const step = canvas.width / waveData.length;
  for (let i = 0; i < waveData.length; i++) {
    const y = canvas.height / 2 - waveData[i] * canvas.height * 3;
    i === 0 ? ctx.moveTo(i * step, y) : ctx.lineTo(i * step, y);
  }
  ctx.stroke();
}

window.addEventListener('load', loadRNNoise);
