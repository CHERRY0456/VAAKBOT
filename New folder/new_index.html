<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VaakBot — Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { 
    --bg: #f3f4f6; 
    --surface: #ffffff; 
    --border: #e5e7eb; 
    --primary: #2563eb; 
    --primary-hover: #1d4ed8;
    --text-main: #111827; 
    --text-muted: #6b7280; 
    --bot-bg: #f8fafc;
    --user-bg: #2563eb;
    --error: #ef4444;
  }
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; 
    height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px;
  }
  
  .app-container {
    width: 100%; max-width: 480px; height: 90vh; max-height: 800px;
    background: var(--surface); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border);
  }

  /* Header */
  .header {
    padding: 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; z-index: 10;
  }
  .header-icon {
    width: 36px; height: 36px; background: var(--primary); color: white;
    border-radius: 10px; display: grid; place-items: center; font-weight: 600; font-size: 18px;
  }
  .header-title { font-weight: 600; font-size: 1.1rem; }
  .header-status { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; }

  /* Chat Area */
  .chat-area {
    flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    background: #f9fafb;
  }
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

  .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: slideIn 0.3s ease; }
  .msg-wrapper.bot { align-self: flex-start; }
  .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }

  .msg-bubble {
    padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5;
  }
  .msg-wrapper.bot .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text-main); }
  .msg-wrapper.user .msg-bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
  
  .msg-time { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }

  /* Interactive Confirm Buttons */
  .confirm-actions { display: flex; gap: 8px; margin-top: 8px; }
  .btn-action {
    padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface);
    font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-main);
  }
  .btn-action.yes { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
  .btn-action.yes:hover { background: #d1fae5; }
  .btn-action.no { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .btn-action.no:hover { background: #fee2e2; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Input Area */
  .input-area {
    padding: 16px 20px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .text-input {
    flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 24px;
    background: #f3f4f6; font-family: inherit; font-size: 0.95rem; outline: none; color: var(--text-muted);
  }
  .mic-btn {
    width: 48px; height: 48px; border-radius: 50%; border: none; background: var(--primary); color: white;
    font-size: 1.2rem; cursor: pointer; display: grid; place-items: center; transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); flex-shrink: 0;
  }
  .mic-btn:hover:not(:disabled) { background: var(--primary-hover); transform: scale(1.05); }
  .mic-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
  
  /* Recording Pulse */
  .mic-btn.recording {
    background: var(--error);
    animation: pulseMic 1.5s infinite;
  }
  @keyframes pulseMic {
    0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
    70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }

  .system-notice { text-align: center; font-size: 0.75rem; color: var(--text-muted); padding-bottom: 8px; }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-icon">व</div>
    <div>
      <div class="header-title">VaakBot</div>
      <div class="header-status" id="systemStatus"><div class="status-dot"></div> Ready</div>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="msg-wrapper bot">
      <div class="msg-bubble">नमस्ते! I am VaakBot. Tap the microphone and speak in your language.</div>
      <div class="msg-time">System</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" class="text-input" placeholder="Tap mic to speak..." disabled />
    <button class="mic-btn" id="btnMic" onclick="toggleRecording()">🎙</button>
  </div>
  <div class="system-notice"> </div> 
</div>

<script>
// ─── CONFIGURATION ────────────────────────────────────────────────
const SAMPLE_RATE       = 48000;
const FRAME_SIZE        = 480; 
const SILENCE_FRAMES_MAX= 200; // 2.0s silence auto-stop
const VAD_THRESHOLD     = 0.85; 
const BACKEND_URL       = "http://localhost:8000/process";

// ─── STATE ────────────────────────────────────────────────────────
let audioCtx, mediaStream, processorNode;
let isRecording = false;
let rawBuffer = new Float32Array(16384);
let rawBufferCount = 0;
let speechBuffer = [];      
let hasSpoken = false;
let silenceFrames = 0;
let consecutiveSpeechFrames = 0;

// RNNoise WASM
let rnnoiseModule, rnnoiseState, rnnoiseProcess, rnnoiseReady = false;
let rnnoiseInputPtr, rnnoiseOutputPtr;

// Pending query state for confirmation
let pendingQuery = null;

// ─── UI FUNCTIONS ─────────────────────────────────────────────────
function updateStatus(text, color = '#10b981') {
  const statusEl = document.getElementById('systemStatus');
  statusEl.innerHTML = `<div class="status-dot" style="background:${color}"></div> ${text}`;
}

function addMessage(text, sender, showActions = false) {
  const chatArea = document.getElementById('chatArea');
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${sender}`;
  
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  
  let html = `<div class="msg-bubble">${text}</div><div class="msg-time">${time}</div>`;
  
  if (showActions) {
    html += `
      <div class="confirm-actions" id="actionGrp">
        <button class="btn-action yes" onclick="confirmQuery(true)">✅ Yes, proceed</button>
        <button class="btn-action no" onclick="confirmQuery(false)">🔄 No, re-record</button>
      </div>
    `;
  }
  
  wrapper.innerHTML = html;
  chatArea.appendChild(wrapper);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ─── INITIALIZATION (WASM) ────────────────────────────────────────
window.addEventListener('load', async () => {
  updateStatus('Loading audio engine...', '#f59e0b');
  try {
    const mod = await import('https://unpkg.com/@jitsi/rnnoise-wasm@0.2.1/dist/rnnoise-sync.js');
    const factory = mod.default || mod.createRNNoiseModule || mod;
    rnnoiseModule = await factory();
    rnnoiseProcess = rnnoiseModule._rnnoise_process_frame;
    rnnoiseInputPtr  = rnnoiseModule._malloc(FRAME_SIZE * 4);
    rnnoiseOutputPtr = rnnoiseModule._malloc(FRAME_SIZE * 4);
    rnnoiseState = rnnoiseModule._rnnoise_create();
    rnnoiseReady = true;
    updateStatus('Ready', '#10b981');
  } catch (e) {
    updateStatus('Failed to load audio engine', '#ef4444');
  }
});

// ─── AUDIO ENGINE ─────────────────────────────────────────────────
function processFrame(frame32) {
  if (!rnnoiseReady) return { cleaned: frame32, vadProb: 1.0 };
  const heapF32In = new Float32Array(rnnoiseModule.HEAPF32.buffer, rnnoiseInputPtr, FRAME_SIZE);
  for (let i = 0; i < FRAME_SIZE; i++) heapF32In[i] = frame32[i] * 32768.0;

  const vadProb = rnnoiseProcess(rnnoiseState, rnnoiseOutputPtr, rnnoiseInputPtr);

  const heapF32Out = new Float32Array(rnnoiseModule.HEAPF32.buffer, rnnoiseOutputPtr, FRAME_SIZE);
  const cleaned = new Float32Array(FRAME_SIZE);
  for (let i = 0; i < FRAME_SIZE; i++) cleaned[i] = heapF32Out[i] / 32768.0;

  return { cleaned, vadProb };
}

function handleAudioData(input) {
  if (!isRecording) return;
  
  if (rawBufferCount + input.length > rawBuffer.length) {
    const newBuf = new Float32Array(rawBuffer.length * 2);
    newBuf.set(rawBuffer);
    rawBuffer = newBuf;
  }
  rawBuffer.set(input, rawBufferCount);
  rawBufferCount += input.length;

  while (rawBufferCount >= FRAME_SIZE) {
    const frame = rawBuffer.slice(0, FRAME_SIZE);
    rawBuffer.copyWithin(0, FRAME_SIZE, rawBufferCount);
    rawBufferCount -= FRAME_SIZE;

    const { cleaned, vadProb } = processFrame(frame);
    const isSpeech = vadProb > VAD_THRESHOLD;

    if (isSpeech) {
      consecutiveSpeechFrames++;
      if (consecutiveSpeechFrames >= 30) hasSpoken = true;
      silenceFrames = 0;
      speechBuffer.push(cleaned);
    } else {
      consecutiveSpeechFrames = 0; 
      silenceFrames++;
      if (hasSpoken) speechBuffer.push(cleaned); 
    }

    if (hasSpoken && silenceFrames >= SILENCE_FRAMES_MAX) {
       stopRecording();
       break; 
    }
  }
}

// ─── RECORDING CONTROLS ───────────────────────────────────────────
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  if (!rnnoiseReady) return;
  updateStatus('Listening...', '#ef4444');
  
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: SAMPLE_RATE, echoCancellation: true, noiseSuppression: true } 
    });
  } catch (e) {
    return updateStatus('Microphone access denied', '#ef4444');
  }

  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  
  const workletCode = `
    class RecorderWorklet extends AudioWorkletProcessor {
      process(inputs) {
        if (inputs[0] && inputs[0].length > 0) this.port.postMessage(inputs[0][0]);
        return true;
      }
    }
    registerProcessor('recorder-worklet', RecorderWorklet);
  `;
  const blob = new Blob([workletCode], { type: 'application/javascript' });
  
  await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));
  processorNode = new AudioWorkletNode(audioCtx, 'recorder-worklet');
  processorNode.port.onmessage = (e) => handleAudioData(e.data);

  const sourceNode = audioCtx.createMediaStreamSource(mediaStream);
  sourceNode.connect(processorNode);

  speechBuffer = [];
  rawBufferCount = silenceFrames = consecutiveSpeechFrames = 0;
  hasSpoken = false;
  isRecording = true;

  const btn = document.getElementById('btnMic');
  btn.classList.add('recording');
}

async function stopRecording() {
  if (!isRecording) return;
  isRecording = false;

  const btn = document.getElementById('btnMic');
  btn.classList.remove('recording');
  btn.disabled = true;

  if (processorNode) processorNode.disconnect();
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();

  if (hasSpoken && silenceFrames > 0) {
    speechBuffer = speechBuffer.slice(0, Math.max(0, speechBuffer.length - silenceFrames));
  }

  if (speechBuffer.length === 0) {
    updateStatus('Ready', '#10b981');
    btn.disabled = false;
    return;
  }

  const flat = new Float32Array(speechBuffer.reduce((a, f) => a + f.length, 0));
  let offset = 0;
  for (const f of speechBuffer) { flat.set(f, offset); offset += f.length; }

  await sendToBackend(buildWAV(flat, SAMPLE_RATE));
}

// ─── NETWORK & 3-TIER LOGIC ───────────────────────────────────────
function buildWAV(float32Samples, sampleRate) {
  const int16 = new Int16Array(float32Samples.length);
  for (let i = 0; i < float32Samples.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Samples[i]));
    int16[i] = s < 0 ? s * 32768 : s * 32767;
  }
  const buffer = new ArrayBuffer(44 + int16.byteLength);
  const view = new DataView(buffer);
  const write = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
  write(0, 'RIFF'); view.setUint32(4, 36 + int16.byteLength, true);
  write(8, 'WAVE'); write(12, 'fmt '); view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true); view.setUint16(34, 16, true);
  write(36, 'data'); view.setUint32(40, int16.byteLength, true);
  new Int16Array(buffer, 44).set(int16);
  return new Blob([buffer], { type: 'audio/wav' });
}

async function sendToBackend(wavBlob) {
  updateStatus('Processing audio...', '#3b82f6');
  const form = new FormData();
  form.append('audio', wavBlob, 'recording.wav');

  try {
    const resp = await fetch(BACKEND_URL, { method: 'POST', body: form });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    handleResponseLogic(data);
  } catch (e) {
    updateStatus('Connection Error', '#ef4444');
    addMessage("Sorry, I couldn't reach the server. Please check your connection.", 'bot');
    document.getElementById('btnMic').disabled = false;
  }
}

// The Core 3-Tier Developer Logic Implementation
// The Core 3-Tier Developer Logic Implementation
function handleResponseLogic(data) {
  document.getElementById('btnMic').disabled = false;
  updateStatus('Ready', '#10b981');
  
  if (!data.text) return;
  addMessage(data.text, 'user');

if (data.verdict === "ACCEPT") {
      addMessage("Audio processed successfully. Confidence is high.", 'bot');

  } else if (data.verdict === "CONFIRM") {
      pendingQuery = data;
      // Using the dynamic language string from Gemini!
      addMessage(data.ui_confirm + " <b>" + data.text + "</b>?", 'bot', true);
      
  } else {
      // REJECT: Using the dynamic language string from Gemini!
      addMessage(data.ui_reject, 'bot');
      
      // Auto-retry trigger
      setTimeout(() => {
          if(!isRecording) startRecording();
      }, 1500);
  }
}

// Handle Confirmation Buttons
function confirmQuery(isConfirmed) {
  // Hide the buttons after clicking
  document.getElementById('actionGrp').style.display = 'none';
  
  if (isConfirmed && pendingQuery) {
     // User confirmed the text was right, display the fetched data
     addMessage(pendingQuery.scheme_data || "Query processed successfully.", 'bot');
  } else {
     addMessage("Okay, let's try again. Tap the mic when you're ready.", 'bot');
  }
  pendingQuery = null;
}
</script>
</body>
</html>
